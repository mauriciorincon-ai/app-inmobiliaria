# CI del kit-app — corre en cada PR y en push a main.
# Gates: typecheck, lint, tests+cobertura, build, audit de deps, e2e, Lighthouse vs perf-budget.json
name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    # Env Supabase DUMMY: el cliente se crea de forma perezosa (nunca en build/prerender), pero
    # damos valores placebo para que nada falle si algo los leyera.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-para-build
      NEXT_PUBLIC_R2_PUBLIC_URL: https://pub-e2e-dummy.r2.dev
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }   # el scaffold estampa pnpm 11 (lockfile + allowBuilds); pnpm 11 exige Node >=22.13
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test            # vitest run --coverage (umbral 80% en src/engine)
      - run: pnpm build
      - run: pnpm audit --audit-level high

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    # Email del operador (no es secreto) + time-trap desactivado para que el llenado rápido de
    # Playwright no lo dispare. La contraseña y el pepper se GENERAN aleatorios en un step (nunca
    # literales en el repo — el hook gitleaks lo exige).
    env:
      OPERADOR_EMAIL: operador@innmobiliaria.test
      REGISTRO_MIN_MS: "0"
      # Todos los envíos del e2e vienen de localhost (misma IP); sin esto el rate limit por IP
      # (3/hora) frenaría el happy-path corriendo en 2 proyectos + reintentos.
      DISABLE_RATE_LIMIT: "1"
      # R2 DUMMY: el presign firma con estas credenciales placebo y el PUT se INTERCEPTA en el
      # e2e (r2-mock), así que nunca se valida contra un bucket real. No son secretos AWS reales.
      NEXT_PUBLIC_R2_PUBLIC_URL: https://pub-e2e-dummy.r2.dev
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      R2_ACCOUNT_ID: dummy-account
      R2_ACCESS_KEY_ID: dummy-key
      R2_SECRET_ACCESS_KEY: dummy-secret
      R2_BUCKET: innmobiliaria-fotos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }   # el scaffold estampa pnpm 11 (lockfile + allowBuilds); pnpm 11 exige Node >=22.13
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Generar credenciales de prueba (sintéticas, efímeras)
        run: |
          echo "OPERADOR_PASSWORD=op-$(openssl rand -hex 12)" >> "$GITHUB_ENV"
          echo "RATE_LIMIT_PEPPER=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      # Stack Supabase real (Docker preinstalado en ubuntu-latest); `start` aplica las migraciones.
      - name: Levantar Supabase local
        run: pnpm exec supabase start
      - name: Exportar URL/keys al entorno del job
        # `supabase status -o env` emite KEY="valor" (con comillas); al volcarlo a $GITHUB_ENV las
        # comillas quedarían DENTRO del valor y romperían createClient. El sed las quita.
        run: |
          pnpm exec supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Z_]+)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - name: Sembrar el operador
        run: node scripts/crear-operador.mjs
      - run: pnpm test:e2e        # happy path por la UI + validaciones + RLS negativa + axe
      - name: Subir artefactos de Playwright si algo falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  lighthouse:
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_R2_PUBLIC_URL: https://pub-e2e-dummy.r2.dev
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }   # el scaffold estampa pnpm 11 (lockfile + allowBuilds); pnpm 11 exige Node >=22.13
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # La ficha /i/[slug] es dinámica y lee la BD → Lighthouse necesita Supabase real. Y como las
      # NEXT_PUBLIC_* se inlinean en BUILD, hay que levantar Supabase y exportar sus valores ANTES
      # de `pnpm build` (mismo patrón K3 del e2e: sed para quitar las comillas de status -o env).
      - name: Levantar Supabase local
        run: pnpm exec supabase start
      - name: Exportar URL/keys al entorno del job
        run: |
          pnpm exec supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Z_]+)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - run: pnpm build
      - name: Sembrar la ficha demo (para /i/[slug])
        run: node scripts/seed-demo.mjs
      - name: Lighthouse CI contra perf-budget.json (URLs de lighthouse-urls.json)
        # Cada sprint añade sus rutas nuevas a lighthouse-urls.json (default: ["/"]).
        # Nota Lantern: el LCP SIMULADO sobre localhost castiga SPAs sanas (nutri-kids S1:
        # 3.8s simulado vs 242ms observado). En S2, /mi-anuncio dio 3685ms simulado vs budget 3500
        # → se activa el remedio COMPROMETIDO (kit v1.6.4): `throttlingMethod: devtools` en
        # lighthouserc.json MIDE el LCP con throttling real en vez de simularlo (más fiel). El
        # gate real sigue siendo LCP ≤2.5s en teléfono (gate ⭐). settings + budgets = lighthouserc.json.
        run: |
          npm i -g @lhci/cli
          URLS=$(node -e "console.log(require('./lighthouse-urls.json').map(u=>'--collect.url=http://localhost:3000'+u).join(' '))")
          lhci autorun --collect.startServerCommand="pnpm start" $URLS
