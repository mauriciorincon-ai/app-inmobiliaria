# Keep-alive del proyecto Supabase free: se pausa tras ~1 semana inactivo. Este cron llama a la
# RPC `ping()` (otorgada a anon) semanalmente para que cuente como actividad.
# No es un check de PR → no toca la ruleset main-protegida.
# Requiere los secrets del repo: SUPABASE_URL y SUPABASE_ANON_KEY (checklist de aprovisionamiento).
name: Supabase keep-alive
on:
  schedule:
    - cron: "17 8 * * 1" # lunes 08:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar RPC ping
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$ANON" ]; then
            echo "Secrets SUPABASE_URL/SUPABASE_ANON_KEY sin configurar; nada que hacer aún."
            exit 0
          fi
          curl -fsS -X POST "$URL/rest/v1/rpc/ping" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d '{}'
