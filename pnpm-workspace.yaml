allowBuilds:
  sharp: true
  unrs-resolver: true
  '@swc/core': true
  esbuild: true
  '@tailwindcss/oxide': true
  '@sentry/cli': false
  # workerd (runtime de Cloudflare, transitivo de wrangler/opennext): su build nativo solo hace
  # falta para `wrangler dev`/deploy (Fase 4). Se deja ignorado para no descargar binario en cada
  # `pnpm install` de CI; se reevalúa al desplegar (ADR 001).
  workerd: false
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - '@swc/core'
  - esbuild
  - '@tailwindcss/oxide'
ignoredBuiltDependencies:
  - '@sentry/cli'
  - workerd
overrides:
  # postcss <8.5.10: XSS por </style> sin escapar (moderate, transitivo de next/sentry/opennext).
  # Herramienta de build (Tailwind); forzamos la versión parchada.
  postcss@<8.5.10: '>=8.5.10'
